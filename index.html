<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#120b05">
<title>The Engine Room · Football Blast · Card Style</title>

<!--
==================================================================================
  FOOTBALL BLAST - THE ENGINE ROOM (Block 2, Weeks 5-8)
  Self-contained single-page app. No build step. Deploy to GitHub Pages as-is.

  STRUCTURE
  - <style> .......... design tokens + all CSS (mobile-first, readability minimums)
  - <script>
      DATA ........... CONCEPTS, MISSIONS, BRAIN_TESTER pool, BADGES, RANKS, XP
      STATE .......... localStorage helpers + updateState() + badge checks
      FEEDBACK ....... toasts, confetti, Web Audio sound cues
      ANIMATIONS ..... 4 inline-SVG top-down pitch animations (SMIL)
      RENDER ......... one render function per route
      ROUTER ......... hash routing + boot

  ROUTES
      #/                     Landing
      #/concepts             Concepts overview (2x2 grid + Brain-Tester card)
      #/concept/scanning     Scanning & Turning   (Week 5)
      #/concept/switch       The Switch           (Week 6)
      #/concept/pcb          Pressure·Cover·Balance (Week 7)
      #/concept/interception Interception         (Week 8)
      #/brain-tester         Brain-Tester (gated: all 4 concepts opened)
      #/settings             Settings

  STATE KEY: localStorage "football-blast-engine-room"
==================================================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ---------- DESIGN TOKENS ---------- */
:root{
  --bg:#0b0a08;
  --panel:#12100d;
  --panel-2:#1b1712;
  --accent:#f29a18;        /* Engine Room orange */
  --accent-bright:#ffb028; /* brighter orange */
  --gold:#ffc857;
  --text:#f6f1e8;
  --dim:#c7b69d;
  --success:#79e292;
  --enemy:#ef695f;
  --line:rgba(242,154,24,.22);
  --orange:#f5821f;
  --glow:rgba(242,154,24,.55);

  /* type scale - mobile minimums (NON-NEGOTIABLE) */
  --fs-body:17px;
  --fs-lead:18px;     /* BIG IDEA / WHAT THIS TEACHES paragraphs */
  --fs-quote:24px;    /* coach voice quotes */
  --fs-h1:48px;       /* landing block title (also see .hero-title clamp) */
  --fs-h1c:40px;      /* concept name */
  --fs-h2:22px;       /* section headers */
  --fs-h3:20px;       /* card titles */
  --fs-small:14px;    /* hard floor - never smaller */
  --space:24px;

  --maxw:600px;
  --radius:16px;
}
@media (min-width:769px){
  :root{
    --fs-body:18px;
    --fs-lead:20px;
    --fs-quote:28px;
    --fs-h1:64px;
    --fs-h1c:52px;
    --fs-h2:28px;
    --fs-h3:24px;
    --space:32px;
  }
}


body::before{content:"";position:fixed;inset:0;pointer-events:none;background:
  radial-gradient(circle at 20% 0%, rgba(255,176,40,.10), transparent 35%),
  radial-gradient(circle at 80% 15%, rgba(255,176,40,.06), transparent 28%),
  linear-gradient(120deg, rgba(255,176,40,.03) 0, rgba(255,176,40,0) 22%, rgba(255,176,40,.03) 44%, rgba(255,176,40,0) 66%, rgba(255,176,40,.03) 88%, rgba(255,176,40,0) 100%);
  mix-blend-mode:screen;opacity:.75;}
body::after{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,176,40,.035) 1px, transparent 1px),linear-gradient(90deg, rgba(255,176,40,.035) 1px, transparent 1px);background-size:26px 26px;opacity:.22}
#app{position:relative;z-index:1}
.pitch-wrap,.hero-panel,.card,.bt-card,.anim-stage,.quiz-card,.panel,.mission-card,.settings-card,.badge-card,.topbar-panel{position:relative;overflow:hidden}
.pitch-wrap::after,.hero-panel::after,.card::after,.bt-card::after,.anim-stage::after{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;box-shadow:inset 0 0 0 1px rgba(255,176,40,.08)}
.cta{font-style:italic}
.display,.hero-title,.cp-title,.cname,.bt-title,.crumb{font-style:italic}

/* ---------- RESET / BASE ---------- */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background: radial-gradient(circle at top, #201409 0%, #0b0a08 45%, #060505 100%);
  color:var(--text);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  font-size:var(--fs-body);
  line-height:1.6;
  letter-spacing:.005em;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  overflow-x:hidden;
}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none}
:focus-visible{outline:3px solid var(--gold);outline-offset:3px;border-radius:6px}

/* ---------- LAYOUT ---------- */
#app{max-width:var(--maxw);margin:0 auto;padding:0 18px 64px;min-height:100vh}
.screen{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.wordmark{
  font-family:'Anton',sans-serif;
  font-size:14px;letter-spacing:.18em;
  color:var(--dim);text-transform:uppercase;
  padding-top:20px;
}
.wordmark b{color:var(--accent-bright);font-weight:400;text-shadow:0 0 18px rgba(242,154,24,.28)}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:18px;gap:12px;
}
.topbar .crumb{font-family:'Anton',sans-serif;letter-spacing:.05em;font-size:18px;color:var(--text);text-transform:uppercase}
.back{
  display:inline-flex;align-items:center;gap:8px;
  min-height:48px;padding:8px 14px 8px 6px;margin-left:-6px;
  font-size:var(--fs-small);font-weight:600;letter-spacing:.04em;
  color:var(--dim);text-transform:uppercase;border-radius:10px;
}
.back:hover{color:var(--text)}
.back svg{width:18px;height:18px}

h1,h2,h3{line-height:1.15;text-transform:uppercase}
.display{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:.01em}

/* ---------- LANDING ---------- */
.hero{padding-top:8px}
.hero-title{
  font-family:'Anton',sans-serif;font-weight:400;
  font-size:clamp(52px,15vw,96px);line-height:.95;letter-spacing:.01em;
  text-transform:uppercase;margin:6px 0 4px;
}
.hero-title .blue{color:var(--accent-bright)}
.tagline{
  font-size:var(--fs-h3);color:var(--gold);font-weight:700;
  letter-spacing:.04em;text-transform:uppercase;margin-bottom:var(--space);
}
.pitch-wrap{
  background:linear-gradient(180deg, rgba(23,18,14,.96), rgba(12,10,8,.98));border:1px solid var(--line);box-shadow:0 12px 28px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,176,40,.06);
  border-radius:var(--radius);padding:14px;margin-bottom:var(--space);
}
.pitch-wrap svg{display:block;width:100%;height:auto}
.lede{
  font-size:var(--fs-lead);line-height:1.7;max-width:60ch;
  color:var(--text);margin-bottom:var(--space);
}
.cta{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;min-height:60px;padding:18px 22px;
  background:linear-gradient(180deg,#ffb334,#f09410);color:#15110d;
  font-family:'Anton',sans-serif;font-size:22px;letter-spacing:.06em;
  text-transform:uppercase;border-radius:14px;
  box-shadow:0 10px 30px -10px rgba(242,154,24,.6);
  transition:transform .15s ease,box-shadow .15s ease,background .15s ease;
}
.cta:hover{background:#ffbf47;transform:translateY(-2px);box-shadow:0 16px 36px -10px rgba(242,154,24,.78)}
.cta:active{transform:translateY(0)}
.cta svg{width:22px;height:22px}

.hero-panel{
  position:relative;overflow:hidden;border-radius:var(--radius);
  background:linear-gradient(135deg,#17110c,#0d0b09);
  border:1px solid var(--line);padding:22px 20px 24px;margin-bottom:var(--space);
}
.hero-panel::before{
  content:"";position:absolute;inset:-40%;
  background:radial-gradient(closest-side,rgba(242,154,24,.22),transparent 70%);
  animation:drift 9s ease-in-out infinite;pointer-events:none;
}
@keyframes drift{0%,100%{transform:translate(-12%,-6%)}50%{transform:translate(14%,8%)}}
.hero-panel>*{position:relative}

/* ---------- CONCEPTS OVERVIEW ---------- */
.subhead{
  font-size:var(--fs-h3);color:var(--dim);font-weight:600;
  letter-spacing:.04em;text-transform:uppercase;margin:var(--space) 0 14px;
}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{
  position:relative;display:flex;flex-direction:column;gap:8px;
  text-align:left;min-height:150px;padding:16px 14px 14px;
  background:linear-gradient(180deg, rgba(23,18,14,.96), rgba(12,10,8,.98));border:1px solid var(--line);box-shadow:0 12px 28px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,176,40,.06);border-radius:14px;
  transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease;
}
.card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 14px 30px -16px rgba(242,154,24,.5)}
.card .ico{width:30px;height:30px;color:var(--accent-bright)}
.card .ico svg{width:100%;height:100%}
.card .cname{font-family:'Anton',sans-serif;font-size:var(--fs-h3);line-height:1.05;letter-spacing:.01em;text-transform:uppercase}
.card .ctag{font-size:var(--fs-small);color:var(--dim);font-weight:500;margin-top:auto}
.card .status{
  position:absolute;top:12px;right:12px;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:15px;font-weight:800;
  border:2px solid var(--line);color:var(--dim);background:#0c1729;
}
.card .status.opened{border-color:var(--accent);color:var(--accent-bright)}
.card .status.starred{border-color:var(--gold);color:var(--gold)}

/* Brain-Tester card */
.bt-card{
  display:flex;align-items:center;gap:14px;width:100%;
  margin-top:14px;padding:18px 16px;min-height:84px;text-align:left;
  border-radius:14px;border:1px solid var(--line);
  background:var(--panel);transition:all .35s ease;
}
.bt-card .bt-ico{flex:0 0 auto;width:34px;height:34px;color:var(--dim)}
.bt-card .bt-ico svg{width:100%;height:100%}
.bt-card .bt-txt{display:flex;flex-direction:column;gap:3px}
.bt-card .bt-title{font-family:'Anton',sans-serif;font-size:var(--fs-h3);letter-spacing:.03em;text-transform:uppercase}
.bt-card .bt-sub{font-size:var(--fs-small);color:var(--dim);font-weight:500}
.bt-card.locked{filter:grayscale(.7);opacity:.78;cursor:default}
.bt-card.unlocked{
  background:linear-gradient(135deg,#ffb334,#d97f08);
  border-color:var(--accent-bright);color:#fff;cursor:pointer;
  box-shadow:0 14px 34px -14px rgba(242,154,24,.55);
}
.bt-card.unlocked .bt-ico,.bt-card.unlocked .bt-sub{color:#dbe6ff}
.bt-card.just-unlocked{animation:unlockPulse 1s ease}
@keyframes unlockPulse{0%{transform:scale(.96)}40%{transform:scale(1.03)}100%{transform:scale(1)}}

.foot-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:22px;padding-top:16px;border-top:1px solid var(--line);
}
.rank-chip{display:flex;flex-direction:column;gap:2px}
.rank-chip .rk{font-family:'Anton',sans-serif;font-size:var(--fs-h3);letter-spacing:.03em;color:var(--gold)}
.rank-chip .xp{font-size:var(--fs-small);color:var(--dim)}
.link-btn{
  min-height:48px;display:inline-flex;align-items:center;gap:8px;padding:8px 12px;
  font-size:var(--fs-small);font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  color:var(--dim);border-radius:10px;
}
.link-btn:hover{color:var(--text)}
.link-btn svg{width:18px;height:18px}

/* ---------- CONCEPT PAGE ---------- */
.cp-title{font-family:'Anton',sans-serif;font-size:var(--fs-h1c);line-height:1;letter-spacing:.01em;margin:8px 0 6px}
.cp-line{font-size:var(--fs-lead);color:var(--accent-bright);font-weight:700;margin-bottom:var(--space)}

.anim-stage{
  position:relative;background:linear-gradient(180deg, rgba(23,18,14,.96), rgba(12,10,8,.98));border:1px solid var(--line);box-shadow:0 12px 28px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,176,40,.06);
  border-radius:var(--radius);padding:12px;margin-bottom:14px;cursor:pointer;
}
.anim-stage svg{display:block;width:100%;height:auto;max-height:60vh;margin:0 auto;border-radius:10px}
.anim-holder{display:flex;justify-content:center}
.anim-cap{font-size:var(--fs-small);color:var(--dim);text-align:center;margin:10px 6px 2px;line-height:1.4}
/* moving tokens animate via transform transitions (correct, on-axis movement) */
.apiece{transition:transform .8s cubic-bezier(.3,.9,.3,1)}
.aball{transition:transform .6s cubic-bezier(.3,.9,.3,1)}
.alane{fill:none;stroke:var(--gold);stroke-width:2.5;stroke-linecap:round;stroke-dasharray:1;stroke-dashoffset:1;transition:stroke-dashoffset .7s ease}
.alane.fwd{stroke:var(--accent-bright)}
.afade{opacity:0;transition:opacity .45s ease}
.afade.on{opacity:1}
.glance{opacity:0}
.glance.gL{animation:glL 1.5s ease forwards}
.glance.gR{animation:glR 1.5s ease forwards}
@keyframes glL{0%{opacity:0}14%{opacity:.34}34%{opacity:0}100%{opacity:0}}
@keyframes glR{0%{opacity:0}46%{opacity:0}58%{opacity:.34}78%{opacity:0}100%{opacity:0}}
@media (prefers-reduced-motion:reduce){.apiece,.aball,.alane,.afade{transition:none}.glance{animation:none}}

/* ported interactive Pressure-Cover-Balance diagram (from reference) */
.pcbwrap{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:10px;margin-bottom:14px}
.pcbwrap svg{display:block;width:100%;height:auto;max-height:58vh;margin:0 auto}
.pcb-piece{transition:transform .9s cubic-bezier(.3,.9,.3,1)}
.pcb-ball{transition:transform .6s cubic-bezier(.3,.9,.3,1)}
.pcb-dbtns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.pcb-dbtn{min-height:48px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:8px 4px;cursor:pointer;color:var(--dim);font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;text-align:center;line-height:1.2;transition:border-color .2s ease,color .2s ease,background .2s ease}
.pcb-dbtn:hover{border-color:var(--accent)}
.pcb-dbtn.sel{border-color:var(--success);color:var(--success);background:rgba(67,240,143,.12)}
.pcb-dbtn.amb.sel{border-color:var(--gold);color:var(--gold);background:rgba(255,200,87,.12)}
.pcb-reveal{margin-top:10px;background:var(--panel-2);border:1px dashed var(--line);border-radius:10px;padding:12px 14px;font-size:var(--fs-body);line-height:1.5;min-height:78px}
.pcb-reveal .rt{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:var(--fs-h3);letter-spacing:.03em;margin-bottom:5px;color:var(--success)}
.pcb-callout{margin-top:12px;border-left:3px solid var(--accent);padding:11px 14px;font-size:var(--fs-small);line-height:1.6;background:rgba(242,154,24,.10);border-radius:0 8px 8px 0}
.pcb-callout b{color:var(--accent-bright);letter-spacing:.06em}
.replay-hint{
  position:absolute;right:14px;top:14px;
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(11,18,32,.82);border:1px solid var(--line);
  padding:6px 10px;border-radius:999px;font-size:var(--fs-small);
  color:var(--dim);font-weight:600;letter-spacing:.03em;pointer-events:none;
}
.replay-hint svg{width:14px;height:14px}

.quote{
  position:relative;margin:var(--space) 0;padding:14px 16px 14px 20px;
  border-left:4px solid var(--accent);
  background:linear-gradient(90deg,rgba(242,154,24,.14),transparent);
  border-radius:0 12px 12px 0;
}
.quote .q{
  font-family:'Anton',sans-serif;font-size:var(--fs-quote);
  line-height:1.18;letter-spacing:.01em;color:var(--text);text-transform:uppercase;
}
.quote .q .pcb{display:block;font-size:.6em;color:var(--accent-bright);letter-spacing:.06em;margin-top:4px}
.quote .by{font-size:var(--fs-small);color:var(--dim);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:8px}

.sec{margin-top:var(--space)}
.sec h2{
  font-family:'Anton',sans-serif;font-size:var(--fs-h2);letter-spacing:.04em;
  color:var(--gold);margin-bottom:10px;
}
.sec p{font-size:var(--fs-body);line-height:1.6;max-width:60ch;color:var(--text)}
.sec.lead p{font-size:var(--fs-lead);line-height:1.7}
.cues{list-style:none;display:flex;flex-direction:column;gap:10px;max-width:60ch}
.cues li{
  position:relative;padding:10px 12px 10px 38px;
  background:linear-gradient(180deg, rgba(23,18,14,.96), rgba(12,10,8,.98));border:1px solid var(--line);box-shadow:0 12px 28px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,176,40,.06);border-radius:10px;
  font-size:var(--fs-body);line-height:1.5;
}
.cues li::before{
  content:"";position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:10px;height:10px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 0 4px rgba(242,154,24,.18);
}
.task-box{
  max-width:60ch;padding:16px 18px;border-radius:12px;
  background:var(--panel-2);border:1px dashed var(--accent);
}
.task-box .tlabel{font-size:var(--fs-small);color:var(--dim);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.task-box .ttext{font-size:var(--fs-lead);line-height:1.5;color:var(--text);font-weight:600}

.reveal-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;min-height:56px;margin-top:calc(var(--space) + 4px);
  background:transparent;border:2px solid var(--accent);color:var(--accent-bright);
  font-family:'Anton',sans-serif;font-size:20px;letter-spacing:.05em;text-transform:uppercase;
  border-radius:14px;transition:all .15s ease;
}
.reveal-btn:hover{background:var(--accent);color:#fff}
.reveal-btn svg{width:20px;height:20px}

/* ---------- MISSION REVEAL PANEL (bottom sheet) ---------- */
.sheet-scrim{
  position:fixed;inset:0;z-index:60;background:rgba(5,9,18,.66);
  opacity:0;pointer-events:none;transition:opacity .28s ease;
  backdrop-filter:blur(2px);
}
.sheet-scrim.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:61;
  max-width:var(--maxw);margin:0 auto;
  background:var(--panel);border-top:1px solid var(--accent);
  border-radius:22px 22px 0 0;padding:18px 18px calc(22px + env(safe-area-inset-bottom));
  transform:translateY(110%);transition:transform .32s cubic-bezier(.22,.9,.3,1);
  max-height:86vh;overflow-y:auto;
  box-shadow:0 -20px 50px -20px rgba(0,0,0,.7);
}
.sheet.open{transform:translateY(0)}
.sheet-grab{width:42px;height:5px;border-radius:3px;background:var(--line);margin:0 auto 14px}
.sheet-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.sheet-head h3{font-family:'Anton',sans-serif;font-size:var(--fs-h2);letter-spacing:.03em;color:var(--text)}
.sheet-sub{font-size:var(--fs-small);color:var(--dim);margin:2px 0 14px}
.sheet-close{
  flex:0 0 auto;width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:var(--panel-2);border:1px solid var(--line);color:var(--dim);
}
.sheet-close:hover{color:var(--text);border-color:var(--accent)}
.sheet-close svg{width:20px;height:20px}
.mlist{display:flex;flex-direction:column;gap:10px}
.mrow{
  display:flex;gap:12px;padding:13px 14px;border-radius:12px;
  background:var(--panel-2);border:1px solid var(--line);
}
.mrow.bonus{border-color:var(--gold);background:linear-gradient(90deg,rgba(255,200,87,.10),var(--panel-2))}
.mrow .mtag{
  flex:0 0 auto;align-self:flex-start;margin-top:2px;
  font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 7px;border-radius:6px;color:#0b0a08;background:var(--accent-bright);
}
.mrow.bonus .mtag{background:var(--gold)}
.mrow .mbody .mname{font-family:'Anton',sans-serif;font-size:var(--fs-h3);letter-spacing:.02em;color:var(--text)}
.mrow .mbody .mdesc{font-size:var(--fs-small);line-height:1.5;color:var(--dim);margin-top:3px}
.sheet-foot{font-size:var(--fs-small);color:var(--dim);text-align:center;margin-top:16px;line-height:1.5}

/* ---------- BRAIN-TESTER ---------- */
.bt-lock-msg{
  margin-top:40px;text-align:center;padding:30px 20px;
  background:linear-gradient(180deg, rgba(23,18,14,.96), rgba(12,10,8,.98));border:1px solid var(--line);box-shadow:0 12px 28px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,176,40,.06);border-radius:var(--radius);
}
.bt-lock-msg .lk{width:46px;height:46px;color:var(--dim);margin:0 auto 14px}
.bt-lock-msg p{font-size:var(--fs-lead);color:var(--text);max-width:36ch;margin:0 auto}
.bt-progress{font-size:var(--fs-small);color:var(--dim);margin-top:14px}

.bt-meta{display:flex;align-items:center;justify-content:space-between;margin:8px 0 16px}
.bt-meta .qcount{font-family:'Anton',sans-serif;font-size:var(--fs-h3);letter-spacing:.04em;color:var(--dim)}
.bt-meta .qcount b{color:var(--accent-bright)}
.bt-bar{height:8px;border-radius:5px;background:var(--panel-2);overflow:hidden;margin-bottom:22px}
.bt-bar i{display:block;height:100%;background:var(--accent);transition:width .4s ease}
.bt-timer{height:10px;border-radius:6px;background:var(--panel-2);overflow:hidden;margin:2px 0 6px}
.bt-timer i{display:block;height:100%;width:100%;background:var(--success);transition:width .12s linear, background .3s ease}
.bt-timenum{text-align:right;font-family:'Anton',sans-serif;font-style:italic;font-size:var(--fs-small);letter-spacing:.04em;color:var(--dim);margin-bottom:16px}
.result .bt-correct{font-size:var(--fs-lead);color:var(--dim);margin-top:10px}
.result .bt-best{font-family:'Anton',sans-serif;font-style:italic;color:var(--gold);letter-spacing:.04em;font-size:var(--fs-lead);margin-top:6px}
.qtext{font-family:'Anton',sans-serif;font-size:clamp(24px,6.5vw,32px);line-height:1.12;letter-spacing:.01em;margin-bottom:20px;text-transform:none}
.opts{display:flex;flex-direction:column;gap:12px}
.opt{
  width:100%;text-align:left;min-height:56px;padding:14px 16px;
  font-size:var(--fs-body);line-height:1.4;
  background:var(--panel);border:2px solid var(--line);border-radius:12px;
  transition:border-color .15s ease,background .15s ease;
}
.opt:hover:not(:disabled){border-color:var(--accent)}
.opt:disabled{cursor:default}
.opt.right{border-color:var(--success);background:rgba(67,240,143,.12)}
.opt.wrong{border-color:var(--enemy);background:rgba(224,86,108,.12)}
.opt .mk{font-weight:800;margin-right:6px}
.fb{margin-top:18px;padding:14px 16px;border-radius:12px;font-size:var(--fs-body);line-height:1.5}
.fb.ok{background:rgba(67,240,143,.12);border:1px solid var(--success);color:var(--text)}
.fb.no{background:rgba(224,86,108,.10);border:1px solid var(--enemy);color:var(--text)}
.fb b{color:var(--text)}
#fbSlot{display:flex;flex-direction:column}
#fbSlot .fb{width:100%}
.nextbtn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  align-self:flex-end;width:auto;min-height:48px;padding:0 22px;margin-top:18px;
  background:linear-gradient(180deg,#ffb334,#f09410);color:#15110d;font-family:'Anton',sans-serif;
  font-size:16px;letter-spacing:.05em;text-transform:uppercase;border-radius:12px;
}
.nextbtn svg{width:18px;height:18px}
.nextbtn:hover{background:#2459e8}

/* results */
.result{text-align:center;padding-top:10px}
.result .score{font-family:'Anton',sans-serif;font-size:clamp(64px,22vw,120px);line-height:1;color:var(--text)}
.result .score small{font-size:.32em;color:var(--dim)}
.result .iq{
  display:inline-block;margin-top:6px;padding:8px 18px;border-radius:999px;
  font-family:'Anton',sans-serif;font-size:var(--fs-h2);letter-spacing:.05em;
  background:var(--gold);color:#0b0a08;
}
.result .iq.razor,.result .iq.genius{background:var(--gold)}
.result .xp-earn{font-size:var(--fs-lead);color:var(--success);font-weight:700;margin-top:18px}
.result .again{margin-top:24px}

/* ---------- SETTINGS ---------- */
.set-sec{margin-top:var(--space);padding:18px;background:linear-gradient(180deg, rgba(23,18,14,.96), rgba(12,10,8,.98));border:1px solid var(--line);box-shadow:0 12px 28px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,176,40,.06);border-radius:var(--radius)}
.set-sec h2{font-family:'Anton',sans-serif;font-size:var(--fs-h2);letter-spacing:.03em;color:var(--text);margin-bottom:14px}
.prog-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;font-size:var(--fs-body)}
.prog-row .v{font-family:'Anton',sans-serif;font-size:var(--fs-h3);color:var(--gold)}
.badge-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px}
.badge{
  display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;
  padding:10px 4px;border-radius:12px;background:var(--panel-2);border:1px solid var(--line);
}
.badge.locked{filter:grayscale(1);opacity:.5}
.badge .bdisc{
  width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 30% 30%,var(--gold),#c98f1d);color:#0b0a08;
}
.badge.locked .bdisc{background:#2a3a55;color:var(--dim)}
.badge .bdisc svg{width:20px;height:20px}
.badge .bname{font-size:10px;font-weight:800;letter-spacing:.03em;text-transform:uppercase;line-height:1.1}
.badge .bdesc-tip{font-size:10px;color:var(--dim);line-height:1.2}

.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:16px;min-height:48px}
.toggle-row .lbl{font-size:var(--fs-body);font-weight:600}
.switch{position:relative;flex:0 0 auto;width:64px;height:48px;display:flex;align-items:center;justify-content:flex-end;background:transparent;border:none}
.switch .track{position:relative;width:58px;height:32px;border-radius:999px;background:var(--panel-2);border:1px solid var(--line);transition:background .2s ease,border-color .2s ease}
.switch[aria-checked="true"] .track{background:var(--accent);border-color:var(--accent-bright)}
.switch .knob{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:transform .2s ease}
.switch[aria-checked="true"] .knob{transform:translateX(26px)}
.danger{
  width:100%;min-height:52px;margin-top:4px;
  background:transparent;border:2px solid var(--enemy);color:var(--enemy);
  font-family:'Anton',sans-serif;font-size:18px;letter-spacing:.04em;text-transform:uppercase;border-radius:12px;
}
.danger:hover{background:var(--enemy);color:#fff}
.set-foot{font-size:var(--fs-small);color:var(--dim);text-align:center;margin-top:22px;line-height:1.5}

/* confirm modal */
.modal-scrim{position:fixed;inset:0;z-index:70;background:rgba(5,9,18,.7);display:none;align-items:center;justify-content:center;padding:24px}
.modal-scrim.open{display:flex}
.modal{max-width:380px;width:100%;background:linear-gradient(180deg, rgba(23,18,14,.96), rgba(12,10,8,.98));border:1px solid var(--line);box-shadow:0 12px 28px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,176,40,.06);border-radius:18px;padding:22px;text-align:center}
.modal h3{font-family:'Anton',sans-serif;font-size:var(--fs-h2);margin-bottom:8px;text-transform:uppercase}
.modal p{font-size:var(--fs-body);color:var(--dim);margin-bottom:20px;line-height:1.5}
.modal-actions{display:flex;gap:12px}
.modal-actions button{flex:1;min-height:50px;border-radius:12px;font-weight:700;font-size:var(--fs-body)}
.btn-ghost{background:var(--panel-2);border:1px solid var(--line);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent)}
.btn-danger{background:var(--enemy);color:#fff;font-family:'Anton',sans-serif;letter-spacing:.04em;text-transform:uppercase}

/* ---------- TOASTS ---------- */
#toasts{position:fixed;left:0;right:0;top:env(safe-area-inset-top,0);z-index:90;display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 16px;pointer-events:none}
.toast{
  max-width:var(--maxw);width:100%;display:flex;align-items:center;gap:10px;
  padding:13px 16px;border-radius:12px;
  background:var(--panel);border:1px solid var(--accent);
  box-shadow:0 16px 40px -16px rgba(0,0,0,.7);
  font-size:var(--fs-body);font-weight:600;
  animation:toastIn .3s ease, toastOut .3s ease 2.3s forwards;
}
.toast.badge{border-color:var(--gold)}
.toast .ti{flex:0 0 auto;width:26px;height:26px;color:var(--accent-bright)}
.toast.badge .ti{color:var(--gold)}
.toast .ti svg{width:100%;height:100%}
@keyframes toastIn{from{transform:translateY(-20px);opacity:0}to{transform:none;opacity:1}}
@keyframes toastOut{to{transform:translateY(-20px);opacity:0}}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  .hero-panel::before{animation:none}
}

.cta{background:linear-gradient(180deg,#f5a623,#e07d0a);color:#1a0d00;box-shadow:0 0 26px -5px var(--glow),0 10px 30px -10px rgba(242,154,24,.55)}

<body>
<div id="app" aria-live="polite"></div>

<!-- Mission reveal bottom-sheet (single shared instance) -->

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script>
"use strict";
/* =====================================================================
   DATA
   ===================================================================== */
const STORAGE_KEY = "football-blast-engine-room";

const CONCEPTS = [

    quote:"Scan. Receive. Turn.",

      "Every time the ball is about to come to you",

    bigIdea:"When the opponent crowds one side of the pitch, the other side opens up. The switch is the move that punishes them for over-committing. A quick two-touch combination, or a long diagonal pass, gets the ball across the pitch faster than defenders can shift. The far winger waits wide, doesn't drift in, and receives in space. Switch the play, win the moment.",

      "You have time on the ball and the path forward is blocked",
      "A teammate calls for the switch"

    teamTask:"If the path is blocked, can we find the player on the other side?",

  {
    id:"pcb", week:7, icon:"triangle",
    name:"Pressure \u00b7 Cover \u00b7 Balance", tagline:"Defend as a unit",
    bigIdeaLine:"Defend as a three. Every time.",
    quote:"Pressure. Cover. Balance.", quoteSub:"PCB.",

    name:"Interception", tagline:"Read the eyes",
    bigIdeaLine:"Read the play before it happens.",

    bigIdea:"Interception is reading the future. The passer's eyes tell you where they want to go. Their hips tell you where the pass is actually heading. Wait too long and you're chasing. Step too early and you've lost your position. The sweet spot: read the cues, take a small step in front, and meet the ball as the pass is made. Don't dive in. Trust the read.",
    cues:[
      "When the passer has a heavy touch and needs to look up",
      "When the passer's body is fully open to make a long pass",

/* Brain-Tester pool: 12 questions. correct answer first in `a`, index in `c`.

   a:["The passer's eyes and hips","The crowd on the sideline","The referee's whistle"], c:0},
  {q:"Why do midfielders rotate positions?",

const XP = {concept:50, animation:25, btCorrect:20, btFirst:100, btRazor:200};
function bestBrainPoints(){ const a=(state.brainTesterScores||[]).map(x=>x.points||0); return a.length?Math.max(...a):0; }
function bonusXP(){ let b=0; if((state.brainTesterScores||[]).length>0) b+=XP.btFirst; if((state.brainTesterScores||[]).some(x=>x.score>=7)) b+=XP.btRazor; return b; }
function xpEarned(){ return (state.conceptsOpened||[]).length*XP.concept + (state.animationsWatched||[]).length*XP.animation + bestBrainPoints() + bonusXP(); }
function xpPossible(){ return 4*XP.concept + 4*XP.animation + 8*BT_MAX + XP.btFirst + XP.btRazor; }

/* =====================================================================
   STATE
   ===================================================================== */
function defaultState(){
  return {
    firstOpen:null, xp:0,
    conceptsOpened:[], animationsWatched:[],
    brainTesterScores:[], badgesEarned:[],
    soundEnabled:true,
    _btUnlockSeen:false   // internal UI flag (not part of the documented model)
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  }catch(e){ return defaultState(); }
}
function saveState(s){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }catch(e){} }

let state = loadState();

/* merge patch, save, then run badge checks */
function updateState(patch){
  state = Object.assign({}, state, patch);
  saveState(state);
  checkBadges();
}

function addXP(amount){ state.xp = (state.xp||0) + amount; saveState(state); }

function checkBadges(){
  const earned = new Set(state.badgesEarned||[]);
  const grant = id=>{
    if(!earned.has(id)){
      earned.add(id);
      state.badgesEarned = Array.from(earned);
      saveState(state);
      const b = BADGES.find(x=>x.id===id);
      celebrate();
      playSound("badge");
      toast(`BADGE: ${b.name.toUpperCase()}`, "badge");
    }
  };
  if(state.firstOpen) grant("first-whistle");
  if((state.conceptsOpened||[]).length>=4) grant("all-concepts-read");
  if((state.animationsWatched||[]).length>=4) grant("animator");
  if((state.brainTesterScores||[]).some(s=>s.score>=7)) grant("sharp-mind");
  const core = ["first-whistle","all-concepts-read","animator","sharp-mind"];
  if(core.every(id=>earned.has(id))) grant("engine-master");
}

const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

function toast(text, type){
  const wrap = document.getElementById("toasts");
  const el = document.createElement("div");
  el.className = "toast" + (type==="badge" ? " badge" : "");
  const icon = type==="badge" ? ICONS.trophy : ICONS.spark;
  el.innerHTML = `<span class="ti">${icon}</span><span>${text}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 2700);
}
function xpToast(amount, label){ toast(`+${amount} XP \u00b7 ${label}`); }

function celebrate(){
  if(typeof confetti !== "function") return;
  const count = reduceMotion ? 30 : 120;
  confetti({particleCount:count, spread:70, origin:{y:0.25},
    colors:["#f29a18","#ffb028","#ffc857","#eaf1f7"]});
  if(!reduceMotion){
    setTimeout(()=>confetti({particleCount:60,angle:60,spread:55,origin:{x:0,y:.4},colors:["#f29a18","#ffc857"]}),120);
    setTimeout(()=>confetti({particleCount:60,angle:120,spread:55,origin:{x:1,y:.4},colors:["#ffb028","#ffc857"]}),240);
  }
}

/* Web Audio sound cues */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ audioCtx=null; }
  }
  if(audioCtx && audioCtx.state==="suspended"){ audioCtx.resume(); }
}
document.addEventListener("pointerdown", ensureAudio, {once:false});
function tone(freq, start, dur, type, vol){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type||"sine"; o.frequency.value = freq;
  o.connect(g); g.connect(audioCtx.destination);
  const t = audioCtx.currentTime + start;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol||0.12, t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.start(t); o.stop(t+dur+0.02);
}
function playSound(kind){
  if(!state.soundEnabled) return;
  ensureAudio();
  if(!audioCtx) return;
  switch(kind){
    case "xp":      tone(660,0,.12,"triangle",.10); break;
    case "badge":   [523,659,784,1047].forEach((f,i)=>tone(f,i*0.09,.22,"triangle",.12)); break;
    case "unlock":  [392,523,659,880].forEach((f,i)=>tone(f,i*0.08,.26,"sawtooth",.10)); break;
    case "correct": tone(700,0,.12,"sine",.12); tone(950,.1,.14,"sine",.10); break;
    case "wrong":   tone(220,0,.18,"square",.08); break;
    case "tap":     tone(520,0,.06,"sine",.07); break;
  }
}

/* Run an animation: (re)inject fresh SVG (instant reset), then drive the timeline. */
function runAnim(stage, id, isFirst){
  const a = ANIM[id];
  const holder = stage.querySelector(".anim-holder");
  if(!holder || !a) return;
  (stage._timers||[]).forEach(clearTimeout);
  stage._timers = [];
  holder.innerHTML = a.svg();
  void holder.offsetWidth; // commit start transforms before transitions run
  a.steps(holder).forEach(s=>{ stage._timers.push(setTimeout(s.do, s.at)); });
  if(isFirst && !state.animationsWatched.includes(id)){
    stage._timers.push(setTimeout(()=>{
      if(!state.animationsWatched.includes(id)){
        updateState({animationsWatched:[...state.animationsWatched, id]});
        addXP(XP.animation);
        xpToast(XP.animation, "ANIMATION WATCHED");
        playSound("xp");
      }
    }, a.dur));
  }
}

};

function wirePCB(){
  const P = {X:document.getElementById("pcbX"), Y:document.getElementById("pcbY"), Z:document.getElementById("pcbZ")};
  const ball = document.getElementById("pcbBall"), dl = document.getElementById("pcbDanger");
  if(!P.X || !ball) return;
  let pcbState = "L", pcbRole = -1;
  function paint(){
    const st = PCB_STATES[pcbState];
    ball.style.transform = `translate(${st.ball[0]}px,${st.ball[1]}px)`;
    dl.setAttribute("x1", st.danger[0]); dl.setAttribute("y1", st.danger[1]);
    ["X","Y","Z"].forEach(k=>{
      const [x,y,role] = st[k]; const g = P[k];
      g.style.transform = `translate(${x}px,${y}px)`;
      const c = g.querySelector("circle"), t = g.querySelector("text");
      t.textContent = role;
      const on = (role-1) === pcbRole;
      c.setAttribute("fill",   on ? "#43f08f" : "#12100d");
      c.setAttribute("stroke", on ? "#43f08f" : "#3b2c17");
      t.setAttribute("fill",   on ? "#04130a" : "#eaf1f7");
    });
  }
  paint();
  const markWatched = ()=>{
    if(!state.animationsWatched.includes("pcb")){
      updateState({animationsWatched:[...state.animationsWatched, "pcb"]});
      addXP(XP.animation); xpToast(XP.animation, "ANIMATION WATCHED"); playSound("xp");
    }
  };
  document.querySelectorAll(".pcb-dbtn[data-d]").forEach(b=>{ b.onclick = ()=>{
    playSound("tap"); markWatched();
    pcbRole = Number(b.dataset.d);
    document.querySelectorAll(".pcb-dbtn[data-d]").forEach(x=>x.classList.toggle("sel", Number(x.dataset.d)===pcbRole));
    document.getElementById("pcbReveal").innerHTML = `<div class="rt">${PCB_ROLES[pcbRole].k}</div>${PCB_ROLES[pcbRole].d}`;
    paint();
  };});
  document.getElementById("pcbMoveBall").onclick = ()=>{
    playSound("tap"); markWatched();
    pcbState = pcbState==="L" ? "R" : "L"; paint();
  };
}

function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
let btSession = null;
let btTimer = null;
const BT_TIME = 15;     // seconds allowed per question
const BT_MAX  = 1000;   // max points for a correct, instant answer

function clearBTTimer(){ if(btTimer){ clearInterval(btTimer); btTimer = null; } }

function startBTSession(){
  const picks = shuffle(BRAIN_TESTER).slice(0,8).map(item=>{
    const correctText = item.a[item.c];
    const opts = shuffle(item.a);
    return {q:item.q, opts, correctIndex:opts.indexOf(correctText)};
  });
  btSession = {questions:picks, i:0, correct:0, points:0, answered:false, qStart:0};
}

function renderBrainTester(){
  if(state.conceptsOpened.length < 4){
    app.innerHTML = `
      <div class="screen">
        <div class="topbar"><button class="back" data-go="#/concepts">${ICONS.back} Concepts</button></div>
        <div class="bt-lock-msg">
          <div class="lk">${ICONS.lock}</div>
          <p>Open all 4 concepts to unlock the Brain-Tester.</p>
          <div class="bt-progress">${state.conceptsOpened.length} / 4 concepts opened</div>
        </div>
      </div>`;
    bindGo();
    return;
  }
  if(!btSession) startBTSession();
  drawBTQuestion();
}

function drawBTQuestion(){
  clearBTTimer();
  const s = btSession;
  const total = s.questions.length;
  if(s.i >= total){ drawBTResult(); return; }
  const item = s.questions[s.i];
  app.innerHTML = `
    <div class="screen">
      <div class="topbar"><button class="back" data-go="#/concepts">${ICONS.back} Concepts</button></div>
      <div class="bt-meta">
        <span class="qcount tnum">Q <b>${s.i+1}</b> / ${total}</span>
        <span class="qcount tnum" style="color:var(--gold)">${s.points.toLocaleString()} pts</span>
      </div>
      <div class="bt-timer"><i id="timerBar"></i></div>
      <div class="bt-timenum"><span id="timeNum">${BT_TIME}</span>s left</div>
      <div class="qtext">${esc(item.q)}</div>
      <div class="opts" id="opts">
        ${item.opts.map((o,idx)=>`<button class="opt" data-idx="${idx}"><span class="mk">${String.fromCharCode(65+idx)}.</span>${esc(o)}</button>`).join("")}
      </div>
      <div id="fbSlot"></div>
    </div>`;
  bindGo();
  document.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click", ()=>answerBT(parseInt(btn.dataset.idx,10), false));
  });
  startQTimer();
}

function nowMs(){ return (typeof performance!=="undefined" && performance.now) ? performance.now() : Date.now(); }

function startQTimer(){
  const s = btSession;
  s.qStart = nowMs();
  const bar = document.getElementById("timerBar");
  const num = document.getElementById("timeNum");
  if(bar) bar.style.width = "100%";
  clearBTTimer();
  btTimer = setInterval(()=>{
    const left = Math.max(0, BT_TIME - (nowMs() - s.qStart)/1000);
    const frac = left / BT_TIME;
    if(bar){
      bar.style.width = (frac*100).toFixed(1)+"%";
      bar.style.background = frac>0.5 ? "var(--success)" : (frac>0.25 ? "var(--gold)" : "var(--enemy)");
    }
    if(num) num.textContent = Math.ceil(left);
    if(left<=0){ clearBTTimer(); answerBT(-1, true); }
  }, 100);
}

function answerBT(idx, timedOut){
  const s = btSession;
  if(s.answered) return;
  s.answered = true;
  clearBTTimer();
  const elapsed = Math.min(BT_TIME, (nowMs() - s.qStart)/1000);
  const item = s.questions[s.i];
  const correct = !timedOut && idx === item.correctIndex;
  let gained = 0;
  if(correct){
    s.correct++;
    gained = Math.round(BT_MAX * (1 - 0.5*(elapsed/BT_TIME)));
    s.points += gained;
    addXP(XP.btCorrect);
  }
  playSound(correct ? "correct" : "wrong");

  document.querySelectorAll(".opt").forEach((btn,i)=>{
    btn.disabled = true;
    if(i===item.correctIndex) btn.classList.add("right");
    else if(i===idx) btn.classList.add("wrong");
  });

  const fb = document.getElementById("fbSlot");
  if(fb){
    fb.innerHTML = correct
      ? `<div class="fb ok">Nailed it. <b>+${gained.toLocaleString()} pts</b> (${Math.round(elapsed)}s)</div>`
      : (timedOut
          ? `<div class="fb no">Time's up. The answer was <b>${esc(item.opts[item.correctIndex])}</b>.</div>`
          : `<div class="fb no">The right answer was <b>${esc(item.opts[item.correctIndex])}</b>.</div>`);
    const isLast = s.i === s.questions.length - 1;
    const next = document.createElement("button");
    next.className = "nextbtn";
    next.innerHTML = (isLast ? "See Results" : "Next") + " " + ICONS.arrow;
    next.addEventListener("click", ()=>{ playSound("tap"); s.i++; s.answered=false; drawBTQuestion(); });
    fb.appendChild(next);
  }
}

function drawBTResult(){
  clearBTTimer();
  const s = btSession;
  const correct = s.correct, total = s.questions.length, points = s.points;
  const label = iqFor(correct);

  const isFirstEver = (state.brainTesterScores||[]).length === 0;
  const hadRazorBefore = (state.brainTesterScores||[]).some(x=>x.score>=7);
  let oneTime = 0;
  if(isFirstEver){ oneTime += XP.btFirst; }
  if(correct>=7 && !hadRazorBefore){ oneTime += XP.btRazor; }
  if(oneTime>0) addXP(oneTime);

  const prevBest = Math.max(0, ...(state.brainTesterScores||[]).map(x=>x.points||0));
  const isBest = points > prevBest && (state.brainTesterScores||[]).length > 0;

  updateState({brainTesterScores:[...(state.brainTesterScores||[]), {score:correct, points, date:new Date().toISOString()}]});

  const earnedThisRound = (correct*XP.btCorrect) + oneTime;

  app.innerHTML = `
    <div class="screen">
      <div class="topbar"><button class="back" data-go="#/concepts">${ICONS.back} Concepts</button></div>
      <div class="result">
        <div class="score tnum" style="font-size:clamp(44px,15vw,82px)">${points.toLocaleString()}<small> pts</small></div>
        ${isBest ? `<div class="bt-best">New best score!</div>` : ``}
        <div class="iq ${label.toLowerCase()}">${esc(label)}</div>
        <div class="bt-correct tnum">${correct} / ${total} correct</div>
        <div class="xp-earn tnum">+${earnedThisRound} XP earned</div>
        <div class="again">
          <button class="cta" id="playAgain">Play Again <span>${ICONS.replay}</span></button>
        </div>
      </div>
    </div>`;
  bindGo();

  if(correct>=7){ celebrate(); }
  document.getElementById("playAgain").addEventListener("click", ()=>{ playSound("tap"); startBTSession(); drawBTQuestion(); });
}

/* =====================================================================
   SCREEN 5 - SETTINGS
   ===================================================================== */
function renderSettings(){
  app.innerHTML = `
    <div class="screen">
      <div class="topbar"><button class="back" data-go="#/concepts">${ICONS.back} Concepts</button></div>
      <h1 class="cp-title display" style="font-size:var(--fs-h1c)">Settings</h1>

      <div class="set-sec">
        <h2>Sound</h2>
        <div class="toggle-row">
          <span class="lbl">Sound effects</span>
          <button class="switch" id="soundToggle" role="switch" aria-checked="${state.soundEnabled}" aria-label="Sound effects">
            <span class="track"><span class="knob"></span></span>
          </button>
        </div>
      </div>

      <div class="set-sec">
        <h2>Reset</h2>
        <button class="danger" id="resetBtn">Reset Progress</button>
      </div>

      <div class="set-foot">Your progress is saved on this device only.<br>Need help? Ask your coach.</div>
    </div>`;
  bindGo();

  const tog = document.getElementById("soundToggle");
  tog.addEventListener("click", ()=>{
    const next = !state.soundEnabled;
    updateState({soundEnabled:next});
    tog.setAttribute("aria-checked", String(next));
    if(next){ ensureAudio(); playSound("tap"); }
  });

  document.getElementById("resetBtn").addEventListener("click", ()=>{
    document.getElementById("resetScrim").classList.add("open");
  });
}

/* reset modal wiring */
document.getElementById("resetCancel").addEventListener("click", ()=>document.getElementById("resetScrim").classList.remove("open"));
document.getElementById("resetScrim").addEventListener("click", e=>{ if(e.target.id==="resetScrim") e.currentTarget.classList.remove("open"); });
document.getElementById("resetConfirm").addEventListener("click", ()=>{
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  state = defaultState();
  btSession = null;
  document.getElementById("resetScrim").classList.remove("open");
  go("#/");
  // ensure a clean landing render even if hash was already "#/"
  router();
});

/* =====================================================================
   ROUTER
   ===================================================================== */
function bindGo(){
  document.querySelectorAll("[data-go]").forEach(el=>{
    el.addEventListener("click", ()=>{ playSound("tap"); go(el.dataset.go); });
  });
}

function router(){
  closeSheet();
  clearBTTimer();
  const hash = location.hash || "#/";
  window.scrollTo(0,0);
  if(hash === "#/" || hash === "#"){ renderLanding(); return; }
  if(hash === "#/concepts"){ renderConcepts(); return; }
  if(hash.startsWith("#/concept/")){ renderConcept(hash.split("/")[2]); return; }
  if(hash === "#/brain-tester"){ renderBrainTester(); return; }
  if(hash === "#/settings"){ renderSettings(); return; }
  renderLanding();
}

window.addEventListener("hashchange", router);
window.addEventListener("DOMContentLoaded", router);
// in case DOMContentLoaded already fired
if(document.readyState !== "loading"){ router(); }
</script>
